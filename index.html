<!DOCTYPE html>
<html dir="rtl" lang="ar" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حلول هادئة | Calm Solutions Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="theme.css">
</head>
<body>

    <main id="main-app">
        
        <header class="main-header">
            <div class="logo-wrapper">
                <svg class="app-logo" viewBox="0 0 100 100" width="50" height="50">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2" />
                    <path d="M70 30 A 25 25 0 1 0 70 70" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" />
                    <rect x="47" y="38" width="6" height="24" fill="currentColor" rx="2" />
                    <rect x="38" y="47" width="24" height="6" fill="currentColor" rx="2" />
                </svg>
                <span class="brand-name">حلول هادئة</span>
            </div>
            
            <div class="header-actions">
                <button id="theme-toggler" title="تبديل الوضع">🌓</button>
                <button id="admin-login-btn" class="hidden">لوحة الإدارة 🔒</button>
            </div>
        </header>

        <section id="render-area">
            <div id="loader" class="loader">جاري تجهيز بيئة العمل...</div>
        </section>

    </main>

    <script src="core.js"></script>
    <script src="security.js"></script>
    <script src="ui-effects.js"></script>
    <script src="ai-bot.js"></script>
    <script src="admin-ui.js"></script>
</body>
</html>
